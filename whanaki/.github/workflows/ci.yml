name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          # Provide minimal placeholder values so Settings() doesn't crash.
          # Production validation is skipped when ENVIRONMENT != "production".
          SECRET_KEY: ci-test-key
          CLERK_SECRET_KEY: sk_test_ci
          STRIPE_SECRET_KEY: sk_test_ci
          RAGFLOW_API_KEY: ci-key
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/ -v --tb=short --no-header

  # ── Frontend: type-check + lint ──────────────────────────────────────────────
  frontend:
    name: Frontend type-check & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint
