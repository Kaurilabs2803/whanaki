name: Deploy to Production

# Runs automatically on every push to main, but only after CI passes.
on:
  push:
    branches: [main]

jobs:
  # ── Gate: CI must pass first ─────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: ci
    environment: production   # Requires manual approval if configured in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_PRODUCTION_IP }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          # Hard timeout — fail the deployment if it hangs
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/whanaki

            echo "--- Pulling latest code ---"
            git fetch origin main
            git reset --hard origin/main

            echo "--- Building changed images ---"
            docker compose -f docker-compose.prod.yml build --no-cache backend frontend

            echo "--- Restarting application services ---"
            docker compose -f docker-compose.prod.yml up -d --scale backend=2 backend frontend

            echo "--- Running database migrations ---"
            docker compose -f docker-compose.prod.yml exec -T backend \
              alembic upgrade head

            echo "--- Health check ---"
            sleep 5
            curl --fail --silent http://localhost:8000/ping \
              || (echo "Health check failed after deploy" && exit 1)

            echo "--- Deploy complete ---"

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on deploy failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Create GitHub issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed on ${new Date().toISOString().slice(0, 10)}`,
              body: `The production deployment triggered by commit ${context.sha} failed.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deploy-failure'],
            });
